# ════════════════════════════════════════════════
# PARINAMA — Render Blueprint (render.yaml)
# Single unified service: FastAPI serves React SPA
# No separate frontend/backend — ONE cold start
# ════════════════════════════════════════════════

services:
  - type: web
    name: parinama-ai
    runtime: python
    region: oregon
    plan: free
    rootDir: parinama
    buildCommand: "chmod +x build.sh && ./build.sh"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.7"
      - key: NODE_VERSION
        value: "20"
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: "https://parinama-ai.onrender.com"
    healthCheckPath: /api/health
