# ════════════════════════════════════════════════
# PARINAMA — Render Blueprint (render.yaml)
# Deploy both backend and frontend on Render
# ════════════════════════════════════════════════

services:
  # ── Backend — FastAPI Web Service ──────────
  - type: web
    name: parinama-backend
    runtime: python
    region: oregon
    rootDir: parinama/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OLLAMA_HOST
        value: http://localhost:11434
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./parinama.db
      - key: PYTHON_VERSION
        value: "3.11.7"
    healthCheckPath: /api/health
    plan: free

  # ── Frontend — Static Site ────────────────
  - type: web
    name: parinama-frontend
    runtime: static
    rootDir: parinama/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /index.html
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /api/*
        destination: https://parinama-backend.onrender.com/api/*
      - type: rewrite
        source: /ws/*
        destination: https://parinama-backend.onrender.com/ws/*
      - type: rewrite
        source: /*
        destination: /index.html
    plan: free
